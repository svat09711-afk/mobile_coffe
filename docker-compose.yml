version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: coffee-api
    volumes:
      - ./server:/app
      - coffee_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/coffee_shop.db
    ports:
      - "8000:8000"
    networks:
      - coffee-network
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: coffee-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - coffee-network
    restart: unless-stopped

networks:
  coffee-network:
    driver: bridge

volumes:
  coffee_data:
